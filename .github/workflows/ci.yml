# CI Pipeline - Core Checks
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Aynı ref için devam eden eski koşuyu iptal et (maliyet: çift/yığılan run önleme).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: project

jobs:
  architectural-guardrails:
    name: Architectural Guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ADR-007 check
        run: |
          if grep -r "req\.idempotencyContext\s*=" apps/api/src/; then
            echo "ADR-007 VIOLATION"; exit 1
          fi
      - name: CI-1 Bare fetch gate
        run: bash apps/api/scripts/ci-1-bare-fetch-gate.sh
      - name: CI-2 PII log leak gate
        run: bash apps/api/scripts/ci-2-pii-log-leak-gate.sh
      - name: CI-3 Scheduler unbounded gate
        run: bash apps/api/scripts/ci-3-scheduler-unbounded-gate.sh
      - name: CI-4 Trust proxy gate
        run: bash apps/api/scripts/ci-4-trust-proxy-gate.sh
      - name: CI-5 Scheduler metrics gate
        run: bash apps/api/scripts/ci-5-scheduler-metrics-gate.sh
      - name: CI-6 Symbol token singleton gate
        run: bash apps/api/scripts/ci-6-symbol-token-singleton-gate.sh
      - name: CI-7 Web no submission-level promote gate
        run: bash apps/api/scripts/ci-7-web-no-submission-promote-gate.sh

  test-suite:
    name: Test Suite
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hukuk_test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hukuk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: project/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
        working-directory: project
      - name: Prisma generate
        run: pnpm --filter @hukuk/api exec prisma generate
        working-directory: project
      - name: Prisma migrate deploy
        run: pnpm --filter @hukuk/api exec prisma migrate deploy
        working-directory: project
      - name: Type check
        run: pnpm --filter @hukuk/api exec tsc --noEmit -p tsconfig.prod.json
        working-directory: project
      - name: Tests
        run: |
          cd apps/api
          npx jest --ci --forceExit --passWithNoTests \
            --testPathPattern="guards/__tests__/(drift-guard|baseline-math|stage-0|stage-1|sd-2|sd-25|sd-26|sd-3)" \
            --testPathIgnorePatterns="node_modules|dist|integration"
        working-directory: project
      - name: Integration Tests (legal-kernel, real Postgres)
        run: |
          cd apps/api
          npx jest --ci --forceExit --runInBand \
            --testPathPattern="(collection-payment-received|domain-event-ingest|uyap-event-ingest\.boundary)\.integration\.spec\.ts$"
        working-directory: project

  # Frontend (apps/web) vitest — jsdom unit/component testleri. DB/prisma GEREKMEZ.
  # RFA-018: web testleri artık CI'da; kırmızı web testi merge'i bloklar.
  web-tests:
    name: Web Tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: project/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
        working-directory: project
      - name: Web vitest (jsdom)
        run: pnpm --filter @hukuk/web test
        working-directory: project