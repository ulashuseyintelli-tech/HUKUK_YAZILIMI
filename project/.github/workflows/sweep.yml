# Phase 5.7 - Compile/Lint/Integration Sweep CI
#
# Çıkış Kriterleri:
# - npm run build → warning = 0
# - npm run lint → error = 0
# - CI full pipeline → yeşil
# - Prod build'de chaos/regression/test yok

name: Sweep

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/api/src/**'
      - 'packages/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/api/src/**'
      - 'packages/**'

jobs:
  # ===========================================================================
  # TYPESCRIPT STRICT CHECK
  # ===========================================================================
  typescript-strict:
    name: TypeScript Strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: TypeScript compile (strict)
        run: pnpm --filter api exec tsc --noEmit
        
      - name: Check for unused code
        run: |
          echo "Checking for unused exports..."
          # ts-prune veya knip ile unused export kontrolü
          # pnpm --filter api exec ts-prune || true

  # ===========================================================================
  # ESLINT ARCHITECTURAL RULES
  # ===========================================================================
  eslint-architecture:
    name: ESLint Architecture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: ESLint check
        run: pnpm --filter api lint
        
      - name: Check no-restricted-imports
        run: |
          echo "Verifying architectural boundaries..."
          # Chaos imports in prod code
          if grep -r "from.*chaos" apps/api/src --include="*.ts" | grep -v ".spec.ts" | grep -v ".test.ts" | grep -v "/chaos/" | grep -v "/regression/" | grep -v "/load-test/" | grep -v "/contracts/"; then
            echo "❌ Found chaos imports in production code!"
            exit 1
          fi
          echo "✅ No chaos imports in production code"

  # ===========================================================================
  # MODULE BOUNDARY SWEEP
  # ===========================================================================
  module-boundary:
    name: Module Boundary Sweep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Run module boundary sweep
        run: |
          cd apps/api
          npx ts-node src/modules/calc-preview/sweep/module-boundary-sweep.ts src/modules/calc-preview

  # ===========================================================================
  # BUILD ARTIFACT SWEEP
  # ===========================================================================
  build-artifact:
    name: Build Artifact Sweep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Build for production
        run: |
          cd apps/api
          pnpm exec tsc -p tsconfig.prod.json
        
      - name: Run build artifact sweep
        run: |
          cd apps/api
          npx ts-node src/modules/calc-preview/sweep/build-artifact-sweep.ts dist
          
      - name: Check build size
        run: |
          echo "Build size analysis:"
          du -sh apps/api/dist
          find apps/api/dist -name "*.js" | wc -l
          
      - name: Verify no source maps
        run: |
          if find apps/api/dist -name "*.map" | grep -q .; then
            echo "⚠️ Source maps found in production build"
            find apps/api/dist -name "*.map" | head -10
          else
            echo "✅ No source maps in production build"
          fi

  # ===========================================================================
  # ENV FLAG VALIDATION
  # ===========================================================================
  env-flag-validation:
    name: Env Flag Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Validate env flags
        run: |
          echo "Checking for direct process.env usage..."
          # Find direct process.env usage outside of env-flags.ts
          if grep -r "process\.env\." apps/api/src --include="*.ts" | grep -v "env-flags.ts" | grep -v ".spec.ts" | grep -v ".test.ts" | grep -v "node_modules"; then
            echo "⚠️ Found direct process.env usage - should use getEnvConfig()"
            # Warning only for now, can be made strict later
          else
            echo "✅ No direct process.env usage found"
          fi
          
      - name: Generate env flag table
        run: |
          cd apps/api
          npx ts-node -e "
            const { generateEnvFlagTable } = require('./src/modules/calc-preview/sweep/env-flags');
            console.log(generateEnvFlagTable());
          "

  # ===========================================================================
  # INTEGRATION SWEEP
  # ===========================================================================
  integration-sweep:
    name: Integration Sweep
    runs-on: ubuntu-latest
    needs: [typescript-strict, eslint-architecture]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Run integration sweep tests
        run: pnpm --filter api test -- --testPathPattern=integration-sweep

  # ===========================================================================
  # SWEEP SUMMARY
  # ===========================================================================
  sweep-summary:
    name: Sweep Summary
    runs-on: ubuntu-latest
    needs: [typescript-strict, eslint-architecture, module-boundary, build-artifact, env-flag-validation, integration-sweep]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          echo "═══════════════════════════════════════════════════════════════════════════════"
          echo "  PHASE 5.7 - SWEEP SUMMARY"
          echo "═══════════════════════════════════════════════════════════════════════════════"
          echo ""
          echo "TypeScript Strict: ${{ needs.typescript-strict.result }}"
          echo "ESLint Architecture: ${{ needs.eslint-architecture.result }}"
          echo "Module Boundary: ${{ needs.module-boundary.result }}"
          echo "Build Artifact: ${{ needs.build-artifact.result }}"
          echo "Env Flag Validation: ${{ needs.env-flag-validation.result }}"
          echo "Integration Sweep: ${{ needs.integration-sweep.result }}"
          echo ""
          
          if [ "${{ needs.typescript-strict.result }}" != "success" ] || \
             [ "${{ needs.eslint-architecture.result }}" != "success" ] || \
             [ "${{ needs.module-boundary.result }}" != "success" ] || \
             [ "${{ needs.build-artifact.result }}" != "success" ] || \
             [ "${{ needs.integration-sweep.result }}" != "success" ]; then
            echo "❌ SWEEP FAILED - Fix issues before merging"
            exit 1
          fi
          
          echo "✅ SWEEP PASSED - Ready for Phase 6"
