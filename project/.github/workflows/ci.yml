# CI Pipeline - Core Checks
#
# Includes:
# - Unit tests
# - Lint checks
# - Architectural guardrails (ADR compliance)
#
# ADR-007: ALS-Only Context Access grep gate

name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/api/src/**'
      - 'packages/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/api/src/**'
      - 'packages/**'

jobs:
  # ===========================================================================
  # UNIT TESTS
  # ===========================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Run unit tests
        run: pnpm --filter api test

  # ===========================================================================
  # ARCHITECTURAL GUARDRAILS
  # ===========================================================================
  architectural-guardrails:
    name: Architectural Guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # ADR-007: ALS-Only Context Access
      # Prevents regression to req.idempotencyContext pattern
      - name: Check for banned req.idempotencyContext (ADR-007)
        run: |
          echo "Checking ADR-007 compliance: ALS-only context access..."
          if grep -r "req\.idempotencyContext\s*=" apps/api/src/; then
            echo ""
            echo "═══════════════════════════════════════════════════════════════════════════════"
            echo "  ❌ ADR-007 VIOLATION: req.idempotencyContext assignment found"
            echo "═══════════════════════════════════════════════════════════════════════════════"
            echo ""
            echo "  Context must be accessed via AsyncLocalStorage only."
            echo "  Use: getIdempotencyContext() from idempotency-context.ts"
            echo ""
            echo "  See: docs/adr/ADR-007-ALS-ONLY-CONTEXT-ACCESS.md"
            echo ""
            exit 1
          fi
          echo "✅ ADR-007 compliant: No req.idempotencyContext assignments"
      
      # Phase 11: Carrier Write-Once Contract
      # Prevents UPDATE SET carrier_* outside upsert EXCLUDED path
      - name: Check carrier write-once contract (Phase 11)
        run: |
          echo "Checking Phase 11 compliance: carrier write-once contract..."
          
          # Gate #1: UPDATE SET carrier_* drift (expect: 0 match outside EXCLUDED)
          VIOLATIONS=$(grep -rn "UPDATE.*SET" apps/api/src/ \
            --include="*.ts" \
            --exclude-dir="__tests__" \
            --exclude="*.spec.ts" \
            --exclude="*.test.ts" \
            | grep -i "carrier_\(json\|version\|truncated\)" \
            | grep -v "EXCLUDED\." \
            || true)
          
          # Gate #2: raw SQL helpers referencing carrier columns (expect: 0 match)
          RAW_VIOLATIONS=$(grep -rn \
            -e "executeRaw.*carrier_\(json\|version\|truncated\)" \
            -e "executeRawUnsafe.*carrier_\(json\|version\|truncated\)" \
            -e "queryRawUnsafe.*carrier_\(json\|version\|truncated\)" \
            apps/api/src/ \
            --include="*.ts" \
            --exclude-dir="__tests__" \
            --exclude="*.spec.ts" \
            --exclude="*.test.ts" \
            || true)
          
          ALL_VIOLATIONS="$(printf "%s\n%s" "$VIOLATIONS" "$RAW_VIOLATIONS" | sed '/^$/d')"
          
          if [ -n "$ALL_VIOLATIONS" ]; then
            echo ""
            echo "═══════════════════════════════════════════════════════════════════════════════"
            echo "  ❌ PHASE 11 VIOLATION: Carrier write-once contract breached"
            echo "═══════════════════════════════════════════════════════════════════════════════"
            echo ""
            echo "$ALL_VIOLATIONS"
            echo ""
            echo "  Carrier columns are write-once: only upsert() INSERT + ON CONFLICT UPDATE"
            echo "  may set carrier_json, carrier_version, carrier_truncated."
            echo ""
            echo "  resolve/markRedriven/atomicRedrive MUST NOT touch carrier columns."
            echo "  executeRaw/executeRawUnsafe/queryRawUnsafe MUST NOT reference carrier columns."
            echo ""
            echo "  See: .kiro/specs/phase-11-carrier-resilience/PHASE-11-DONE.md"
            echo ""
            exit 1
          fi
          
          echo "✅ Phase 11 compliant: carrier write-once contract intact"
      
      # Future guardrails can be added here
      # - ADR-XXX: ...

      # Phase 0b: Bare fetch() gate (CI-1)
      - name: CI-1 Bare fetch gate
        run: bash apps/api/scripts/ci-1-bare-fetch-gate.sh

      # Phase 0b: PII log leak gate (CI-2)
      - name: CI-2 PII log leak gate
        run: bash apps/api/scripts/ci-2-pii-log-leak-gate.sh

      # Phase 0b: Scheduler unbounded query gate (CI-3)
      - name: CI-3 Scheduler unbounded query gate
        run: bash apps/api/scripts/ci-3-scheduler-unbounded-gate.sh

      # Phase 0b: Trust proxy gate (CI-4)
      - name: CI-4 Trust proxy gate
        run: bash apps/api/scripts/ci-4-trust-proxy-gate.sh

      # Phase 0b: Scheduler metrics gate (CI-5)
      - name: CI-5 Scheduler metrics gate
        run: bash apps/api/scripts/ci-5-scheduler-metrics-gate.sh

  # ===========================================================================
  # CI SUMMARY
  # ===========================================================================
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, architectural-guardrails]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          echo "═══════════════════════════════════════════════════════════════════════════════"
          echo "  CI SUMMARY"
          echo "═══════════════════════════════════════════════════════════════════════════════"
          echo ""
          echo "Unit Tests: ${{ needs.unit-tests.result }}"
          echo "Architectural Guardrails: ${{ needs.architectural-guardrails.result }}"
          echo ""
          
          if [ "${{ needs.unit-tests.result }}" != "success" ] || \
             [ "${{ needs.architectural-guardrails.result }}" != "success" ]; then
            echo "❌ CI FAILED"
            exit 1
          fi
          
          echo "✅ CI PASSED"
