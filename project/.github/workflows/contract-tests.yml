# Phase 5.6 - Contract Tests CI Workflow
#
# Provider schema + semantic validation on every PR.
#
# @see apps/api/src/modules/calc-preview/contracts/README.md

name: Contract Tests

on:
  push:
    branches: [main, 'release/*']
    paths:
      - 'apps/api/src/modules/calc-preview/contracts/**'
      - 'apps/api/src/modules/interest-engine/rates/**'
      - 'apps/api/src/modules/fee-engine/**'
      - 'apps/api/src/modules/policy-engine/**'
  
  pull_request:
    branches: [main, 'release/*']
    paths:
      - 'apps/api/src/modules/calc-preview/contracts/**'
      - 'apps/api/src/modules/interest-engine/rates/**'
      - 'apps/api/src/modules/fee-engine/**'
      - 'apps/api/src/modules/policy-engine/**'

env:
  NODE_VERSION: '20'

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run contract tests
        run: |
          pnpm --filter api test -- \
            --testPathPattern='contracts/providers/.*/contract.spec.ts' \
            --coverage \
            --coverageDirectory=coverage/contracts
      
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-test-coverage
          path: apps/api/coverage/contracts/
          retention-days: 7
      
      - name: Check for schema changes
        if: github.event_name == 'pull_request'
        run: |
          # Check if schema files were modified
          SCHEMA_CHANGES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E 'schema\.ts$' || true)
          
          if [ -n "$SCHEMA_CHANGES" ]; then
            echo "::warning::Schema files modified. Ensure backward compatibility!"
            echo "Modified schemas:"
            echo "$SCHEMA_CHANGES"
          fi
      
      - name: Generate summary
        if: always()
        run: |
          echo "# Contract Tests Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Provider | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          
          # Check each provider
          for provider in rate-provider tariff-provider policy-engine; do
            if grep -q "PASS" apps/api/coverage/contracts/lcov-report/index.html 2>/dev/null; then
              echo "| $provider | ✅ |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $provider | ⚠️ |" >> $GITHUB_STEP_SUMMARY
            fi
          done

  # Optional: Live smoke test against staging
  contract-live-smoke:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: contract-tests
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run live smoke tests
        if: ${{ vars.STAGING_API_URL }}
        env:
          STAGING_API_URL: ${{ vars.STAGING_API_URL }}
        run: |
          echo "Live smoke tests would run against $STAGING_API_URL"
          # TODO: Implement live smoke tests
          # pnpm --filter api test:contracts:live
