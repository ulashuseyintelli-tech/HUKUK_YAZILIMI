# recipes_v9_extensions.yaml
# v9: Satış sonrası akış + tahsilat dağıtım simülasyonu + borçlu davranış skoru

recipes:

  - recipe_id: MonitorSaleToCompletion
    version: 9
    stage_tags: [SATIS]
    trigger: {type: schedule, when: ["EVERY_24_HOURS"]}
    preconditions:
      - "session.is_logged_in == true"
      - "case.events.contains('SALE_STARTED')"
    uyap_nav_path: ["Haciz & Mal & Satış İşlemleri", "İhale İşlemleri"]
    read:
      table: "sale_status"
      fields: ["ihale_tarihi", "durum", "sonuc", "aciklama", "sale_price"]
    actions:
      - type: query
        input: {dosya_no: "{{case.uyap_dosya_no}}"}
    decisions:
      - if: "any(durum == 'SONUCLANDI')"
        then: {emit: "SALE_COMPLETED"}
    postconditions: ["case.events += SALE_STATUS_SNAPSHOT"]
    proof: {store: ["timestamp", "snapshot_hash"]}
    audit: {level: read_only}

  - recipe_id: SimulateTahsilatDistributionAfterSale
    version: 9
    stage_tags: [SATIS, TAHSILAT]
    trigger: {type: event, when: ["SALE_COMPLETED"]}
    preconditions:
      - "facts.LienSnapshot != empty"
      - "facts.ValuationEstimate != null"
    uyap_nav_path: ["(internal)"]
    read:
      fields:
        - "sale.sale_price"
        - "params.recovery.cost_budgets.satis_avansi"
        - "facts.LienSnapshot[*]"
        - "case.claim_amount"
    actions:
      - type: compute
        formula: |
          # tahsilat_distribution_v9.yaml motorunu çağır (orchestrator seviyesinde)
          emit("RUN_DISTRIBUTION_SIMULATION")
    decisions:
      - if: "distribution.our_expected_recovery < params.recovery.min_net_for_cost_actions/2"
        then: {enqueue: ["RequireAttorneyDecision"]}
    postconditions:
      - "case.events += DISTRIBUTION_SIMULATED"
    proof: {store: ["timestamp", "distribution.our_expected_recovery"]}
    audit: {level: controlled_write}

  - recipe_id: MonitorTahsilatAfterSale
    version: 9
    stage_tags: [TAHSILAT]
    trigger: {type: schedule, when: ["EVERY_24_HOURS"]}
    preconditions: ["session.is_logged_in == true", "case.events.contains('SALE_COMPLETED')"]
    uyap_nav_path: ["Harç ve Kasa İşlemleri", "Tahsilat"]
    read:
      table: "tahsilat"
      fields: ["tarih", "tutar", "makbuz_no", "aciklama"]
    actions:
      - type: query
        input: {dosya_no: "{{case.uyap_dosya_no}}"}
    decisions:
      - if: "delta_count > 0"
        then: {emit: "TAHSILAT_UPDATED"}
    postconditions: ["case.events += TAHSILAT_DELTA"]
    proof: {store: ["timestamp", "delta_count"]}
    audit: {level: read_only}

  - recipe_id: ComputeDebtorBehaviorScore
    version: 9
    scope: debtor
    stage_tags: [TEBLIGAT, VARLIK, HACIZ, TAHSILAT, SATIS]
    trigger: {type: schedule, when: ["EVERY_7_DAYS"]}
    preconditions: ["runtime.debtor_scope_id != null"]
    uyap_nav_path: ["(internal)"]
    read:
      fields:
        - "debtor.signals"
        - "facts.AssetFound"
        - "facts.ValuationEstimate"
        - "facts.LienSnapshot"
        - "case.events"
    actions:
      - type: compute
        formula: |
          emit("RUN_DEBTOR_BEHAVIOR_SCORE")
    postconditions:
      - "debtor.behavior_score != null"
    proof: {store: ["timestamp", "runtime.debtor_scope_id", "debtor.behavior_score"]}
    audit: {level: controlled_write}
