# ============================================
# ALACAK KALEMİ SETLERİ
# Takip türüne göre otomatik oluşturulacak kalemler
# ============================================

version: 1
engine: claim_item_sets

# Legend:
# required: true  -> Otomatik eklenir
# required: false -> Önerilir (kullanıcı onayıyla)
# calc_ref: xxx   -> Hesaplama fonksiyonu

# --------------------------------------------
# İLAMSIZ GENEL (Fatura/Sözleşme/Cari Hesap)
# --------------------------------------------
ILAMSIZ_GENEL:
  match:
    caseType: "ILAMSIZ"
    subCategory: "ILAMSIZ_GENEL"
  items:
    - type: PRINCIPAL
      label: "Asıl Alacak"
      amount_source: "doc.extracted.totalAmount"
      currency_source: "doc.extracted.currency"
      date_source: "doc.extracted.dueDate"
      required: true
      
    - type: ACCRUED_INTEREST
      label: "İşlemiş Faiz (Takip Öncesi)"
      required: false
      calc_ref: "interest_calc"
      params:
        interest_type: "YASAL"
        start_date_source: "doc.extracted.dueDate"
        end_date_source: "case.filingDate"
        
    - type: POST_INTEREST_RULE
      label: "Takip Sonrası Faiz"
      required: true
      params:
        selectable: ["YASAL", "TICARI"]
        default: "YASAL"
        variable_rate: true

# --------------------------------------------
# KİRA ALACAĞI (İlamsız)
# --------------------------------------------
KIRA_ALACAGI:
  match:
    caseType: "KIRA"
    subCategory: "ILAMSIZ_KIRA"
  items:
    - type: PRINCIPAL
      label: "Kira Alacağı"
      required: true
      calc_ref: "periodic_rent_builder"
      params:
        monthly_amount_source: "doc.extracted.rentAmount"
        periods_source: "wizard.rentPeriods"
        due_day_source: "doc.extracted.paymentDay"
        
    - type: ACCRUED_INTEREST
      label: "İşlemiş Faiz"
      required: false
      calc_ref: "interest_calc"
      params:
        interest_type: "YASAL"
        
    - type: POST_INTEREST_RULE
      label: "Takip Sonrası Faiz"
      required: false
      params:
        selectable: ["YASAL", "TICARI"]
        default: "YASAL"

# --------------------------------------------
# TAHLİYE
# --------------------------------------------
TAHLIYE:
  match:
    caseType: "TAHLIYE"
    subCategory: "TAHLIYE_KIRA"
  items:
    - type: OTHER
      label: "Tahliye Talebi"
      required: true
      params:
        reason_required: true
        reasons:
          - "Tahliye taahhüdü"
          - "Temerrüt (kira ödenmemesi)"
          - "Sözleşme süresi sonu"
          - "İhtiyaç (malik ihtiyacı)"
          - "Yeniden inşa/imar"
          
    - type: PRINCIPAL
      label: "Kira Alacağı (varsa)"
      required: false
      amount_source: "wizard.optionalRentArrears"

# --------------------------------------------
# KAMBİYO - ÇEK
# --------------------------------------------
KAMBIYO_CEK:
  match:
    caseType: "KAMBIYO"
    subCategory: "KAMBIYO_CEK"
  items:
    - type: PRINCIPAL
      label: "Çek Bedeli"
      required: true
      amount_source: "doc.extracted.instrumentAmount"
      currency_source: "doc.extracted.currency"
      date_source: "doc.extracted.issueDate"
      extra:
        serial_no_source: "doc.extracted.serialNo"
        bank_branch_source: "doc.extracted.bankBranch"
        drawer_source: "doc.extracted.drawer"
        
    - type: ACCRUED_INTEREST
      label: "İşlemiş Faiz (Takip Öncesi)"
      required: false
      calc_ref: "interest_calc"
      params:
        interest_type: "TICARI"
        start_date_source: "doc.extracted.issueDate"
        end_date_source: "case.filingDate"
        
    - type: PENALTY
      label: "Karşılıksız Çek Tazminatı"
      required: false
      calc_ref: "percent_of_principal"
      params:
        rate: 0.10
        max_rate: 0.20
        condition: "wizard.isKarsilıksiz"
        
    - type: EXPENSE
      label: "Komisyon"
      required: false
      amount_source: "wizard.optionalCommission"
      
    - type: FEE
      label: "İhtiyati Haciz Harcı"
      required: false
      amount_source: "wizard.optionalPrecautionaryFee"
      
    - type: ATTORNEY_FEE
      label: "İhtiyati Haciz Vekalet Ücreti"
      required: false
      amount_source: "wizard.optionalPrecautionaryAttorneyFee"
      
    - type: POST_INTEREST_RULE
      label: "Takip Sonrası Faiz"
      required: true
      params:
        selectable: ["YASAL", "TICARI"]
        default: "TICARI"
        variable_rate: true
        allow_custom_rate: true

# --------------------------------------------
# KAMBİYO - SENET/BONO
# --------------------------------------------
KAMBIYO_SENET:
  match:
    caseType: "KAMBIYO"
    subCategory: "KAMBIYO_SENET"
  items:
    - type: PRINCIPAL
      label: "Senet/Bono Bedeli"
      required: true
      amount_source: "doc.extracted.instrumentAmount"
      currency_source: "doc.extracted.currency"
      date_source: "doc.extracted.dueDate"
      extra:
        serial_no_source: "doc.extracted.serialNo"
        drawer_source: "doc.extracted.drawer"
        endorsers_source: "doc.extracted.endorsers"
        
    - type: ACCRUED_INTEREST
      label: "İşlemiş Faiz (Takip Öncesi)"
      required: false
      calc_ref: "interest_calc"
      params:
        interest_type: "TICARI"
        start_date_source: "doc.extracted.dueDate"
        end_date_source: "case.filingDate"
        
    - type: POST_INTEREST_RULE
      label: "Takip Sonrası Faiz"
      required: true
      params:
        selectable: ["YASAL", "TICARI"]
        default: "TICARI"
        variable_rate: true

# --------------------------------------------
# İLAMLI GENEL
# --------------------------------------------
ILAMLI_GENEL:
  match:
    caseType: "ILAMLI"
    subCategory: "ILAMLI_GENEL"
  items:
    - type: PRINCIPAL
      label: "İlamlı Asıl Alacak"
      required: true
      amount_source: "doc.extracted.judgmentAmount"
      currency_source: "doc.extracted.currency"
      date_source: "doc.extracted.judgmentDate"
      
    - type: POST_INTEREST_RULE
      label: "Takip Sonrası Faiz"
      required: true
      params:
        selectable: ["YASAL", "TICARI", "CUSTOM"]
        default: "YASAL"
        variable_rate: true
        note: "İlam hükmüne göre belirlenir"

# --------------------------------------------
# İLAMLI NAFAKA
# --------------------------------------------
ILAMLI_NAFAKA:
  match:
    caseType: "ILAMLI"
    subCategory: "ILAMLI_NAFAKA"
  items:
    - type: PRINCIPAL
      label: "Nafaka Alacağı"
      required: true
      calc_ref: "periodic_nafaka_builder"
      params:
        monthly_amount_source: "doc.extracted.nafakaAmount"
        periods_source: "wizard.nafakaPeriods"
        start_date_source: "doc.extracted.nafakaStartDate"
        
    - type: POST_INTEREST_RULE
      label: "Takip Sonrası Faiz"
      required: false
      params:
        selectable: ["YASAL"]
        default: "YASAL"
        note: "Nafakada faiz genellikle talep edilmez"

# --------------------------------------------
# İLAMLI DÖVİZ
# --------------------------------------------
ILAMLI_DOVIZ:
  match:
    caseType: "ILAMLI"
    subCategory: "ILAMLI_DOVIZ"
  items:
    - type: PRINCIPAL
      label: "Döviz Asıl Alacak"
      required: true
      amount_source: "doc.extracted.judgmentAmount"
      currency_source: "doc.extracted.currency"
      
    - type: OTHER
      label: "Kur Kuralı"
      required: true
      params:
        exchange_policy_required: true
        options:
          - code: "ODEME_TARIHI"
            label: "Fiili ödeme tarihindeki TCMB efektif satış kuru"
          - code: "TAKIP_TARIHI"
            label: "Takip tarihindeki kur"
          - code: "BELIRLI_TARIH"
            label: "Belirli bir tarihteki kur"
            
    - type: POST_INTEREST_RULE
      label: "Takip Sonrası Faiz"
      required: true
      params:
        selectable: ["YASAL", "TICARI", "CUSTOM"]
        default: "YASAL"

# --------------------------------------------
# İŞÇİLİK ALACAĞI
# --------------------------------------------
ISCILIK:
  match:
    caseType_any_of: ["ILAMLI", "ILAMSIZ"]
    docType: "WORK_LABOR"
  items:
    - type: PRINCIPAL
      label: "İşçilik Alacağı"
      required: true
      calc_ref: "labor_breakdown_builder"
      params:
        components:
          - code: "KIDEM"
            label: "Kıdem Tazminatı"
            interest_type: "YASAL"
          - code: "IHBAR"
            label: "İhbar Tazminatı"
            interest_type: "YASAL"
          - code: "UCRET"
            label: "Ücret Alacağı"
            interest_type: "YASAL"
          - code: "FAZLA_MESAI"
            label: "Fazla Mesai Ücreti"
            interest_type: "YASAL"
          - code: "YILLIK_IZIN"
            label: "Yıllık İzin Ücreti"
            interest_type: "YASAL"
          - code: "AGI"
            label: "Asgari Geçim İndirimi"
            interest_type: "YASAL"
          - code: "DIGER"
            label: "Diğer Alacaklar"
            interest_type: "YASAL"
            
    - type: POST_INTEREST_RULE
      label: "Takip Sonrası Faiz"
      required: true
      params:
        selectable: ["YASAL"]
        default: "YASAL"
        note: "İşçilik alacaklarında yasal faiz uygulanır"
