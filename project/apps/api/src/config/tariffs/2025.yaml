# ============================================
# 2025 YILI TARİFE TABLOSU
# İcra Takibi Harç ve Masrafları
# ============================================

version: 1
year: 2025
effective_date: "2025-01-01"

# --------------------------------------------
# SABİT HARÇLAR
# --------------------------------------------
fixed_fees:
  # Başvurma Harcı (tüm takiplerde)
  application_fee:
    amount: 615.40
    label: "Başvurma Harcı"
    item_type: FEE
    applies_to: ["ILAMSIZ", "ILAMLI", "KAMBIYO", "KIRA", "TAHLIYE", "REHIN", "IFLAS"]
    
  # Vekalet Suret Harcı
  poa_copy_fee:
    amount: 87.50
    label: "Vekalet Suret Harcı"
    item_type: FEE
    applies_to: ["ILAMSIZ", "ILAMLI", "KAMBIYO", "KIRA", "TAHLIYE", "REHIN", "IFLAS"]
    
  # Vekalet Pulu / Baro Pulu
  bar_stamp_fee:
    amount: 138.00
    label: "Vekalet Pulu"
    item_type: STAMP
    applies_to: ["ILAMSIZ", "ILAMLI", "KAMBIYO", "KIRA", "TAHLIYE", "REHIN", "IFLAS"]

# --------------------------------------------
# NİSPİ HARÇLAR
# --------------------------------------------
rate_fees:
  # İlamsız Peşin Harç (binde 5)
  ilamsiz_pesin_harc:
    rate: 0.005
    label: "Peşin Harç"
    item_type: FEE
    base: "principal_plus_interest"  # Anapara + işlemiş faiz
    applies_to: ["ILAMSIZ", "KIRA"]
    min_amount: 100.00
    max_amount: null
    
  # Kambiyo Peşin Harç (binde 5)
  kambiyo_pesin_harc:
    rate: 0.005
    label: "Peşin Harç"
    item_type: FEE
    base: "principal_plus_interest"
    applies_to: ["KAMBIYO"]
    min_amount: 100.00
    max_amount: null

