# ============================================
# 2025 YILI TARİFE TABLOSU
# İcra Takibi Harç ve Masrafları
# ============================================

version: 1
year: 2025
effective_date: "2025-01-01"

# --------------------------------------------
# SABİT HARÇLAR
# --------------------------------------------
fixed_fees:
  # Başvurma Harcı (tüm takiplerde)
  application_fee:
    amount: 615.40
    label: "Başvurma Harcı"
    item_type: FEE
    applies_to: ["ILAMSIZ", "ILAMLI", "KAMBIYO", "KIRA", "TAHLIYE", "REHIN", "IFLAS"]
    
  # Vekalet Suret Harcı
  poa_copy_fee:
    amount: 87.50
    label: "Vekalet Suret Harcı"
    item_type: FEE
    applies_to: ["ILAMSIZ", "ILAMLI", "KAMBIYO", "KIRA", "TAHLIYE", "REHIN", "IFLAS"]
    
  # Vekalet Pulu / Baro Pulu
  bar_stamp_fee:
    amount: 138.00
    label: "Vekalet Pulu"
    item_type: STAMP
    applies_to: ["ILAMSIZ", "ILAMLI", "KAMBIYO", "KIRA", "TAHLIYE", "REHIN", "IFLAS"]

# --------------------------------------------
# NİSPİ HARÇLAR
# --------------------------------------------
rate_fees:
  # İlamsız Peşin Harç (binde 5)
  ilamsiz_pesin_harc:
    rate: 0.005
    label: "Peşin Harç"
    item_type: FEE
    base: "principal_plus_interest"  # Anapara + işlemiş faiz
    applies_to: ["ILAMSIZ", "KIRA"]
    min_amount: 100.00
    max_amount: null
    
  # Kambiyo Peşin Harç (binde 5)
  kambiyo_pesin_harc:
    rate: 0.005
    label: "Peşin Harç"
    item_type: FEE
    base: "principal_plus_interest"
    applies_to: ["KAMBIYO"]
    min_amount: 100.00
    max_amount: null

# --------------------------------------------
# TEBLİGAT ÜCRETLERİ
# --------------------------------------------
postage:
  UETS:
    amount: 15.00
    label: "UETS Tebligat"
    description: "Elektronik tebligat (KEP/UETS)"
    
  NORMAL:
    amount: 210.00
    label: "Normal Tebligat"
    description: "PTT normal tebligat"
    
  FAST:
    amount: 420.00
    label: "Hızlı Tebligat"
    description: "PTT hızlı tebligat"
    
  PUBLIC_ANNOUNCEMENT:
    amount: null  # İlan metnine göre hesaplanır
    label: "İlanen Tebligat"
    description: "Gazete ilanı ile tebligat"
    formula: "ilan_satir_sayisi * satir_ucreti"

# --------------------------------------------
# FAİZ ORANLARI (Yıllık %)
# --------------------------------------------
interest_rates:
  TRY:
    YASAL:
      - start_date: "2024-07-01"
        rate: 24
      - start_date: "2025-01-01"
        rate: 24  # Güncellenecek
    TICARI:
      - start_date: "2024-07-01"
        rate: 48
      - start_date: "2025-01-01"
        rate: 48  # Güncellenecek
    AVANS:
      - start_date: "2024-07-01"
        rate: 32
      - start_date: "2025-01-01"
        rate: 32  # Güncellenecek
        
  USD:
    YASAL:
      - start_date: "2024-01-01"
        rate: 9
    TICARI:
      - start_date: "2024-01-01"
        rate: 12
        
  EUR:
    YASAL:
      - start_date: "2024-01-01"
        rate: 9
    TICARI:
      - start_date: "2024-01-01"
        rate: 12

# --------------------------------------------
# CEZA/TAZMİNAT ORANLARI
# --------------------------------------------
penalties:
  bad_check_compensation:
    default_rate: 0.10  # %10
    max_rate: 0.20      # %20
    label: "Karşılıksız Çek Tazminatı"
    base: "principal"
    
  contractual_penalty:
    default_rate: null  # Sözleşmeden
    max_rate: null
    label: "Cezai Şart"
    base: "principal"

# --------------------------------------------
# AVUKATLIK ASGARİ ÜCRET TARİFESİ 2025
# İcra ve İflas Takipleri (Karşı Taraf Vekalet Ücreti)
# --------------------------------------------
attorney_fees:
  icra_takip:
    # İcra dairelerinde yapılan takipler için
    # Takip tutarı üzerinden kademeli hesaplama
    tiers:
      - min: 0
        max: 55000
        fixed: 11000  # 55.000 TL'ye kadar sabit 11.000 TL
        rate: 0
      - min: 55000
        max: 130000
        fixed: 11000
        rate: 0.14    # 55.000 - 130.000 arası %14
      - min: 130000
        max: 390000
        fixed: 21500  # 11.000 + (75.000 * 0.14)
        rate: 0.12    # 130.000 - 390.000 arası %12
      - min: 390000
        max: 780000
        fixed: 52700  # 21.500 + (260.000 * 0.12)
        rate: 0.08    # 390.000 - 780.000 arası %8
      - min: 780000
        max: 1950000
        fixed: 83900  # 52.700 + (390.000 * 0.08)
        rate: 0.04    # 780.000 - 1.950.000 arası %4
      - min: 1950000
        max: null
        fixed: 130700 # 83.900 + (1.170.000 * 0.04)
        rate: 0.01    # 1.950.000 üzeri %1
    
    # Minimum ücret
    minimum: 11000
    
    # Açıklama
    description: "2025 Avukatlık Asgari Ücret Tarifesi - İcra Takipleri"
