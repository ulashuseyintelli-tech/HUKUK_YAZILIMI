rules:
  - rule_id: R_ASSET_FOUND_VEHICLE_TRIGGERS_LIENS_AND_VAL
    when: "fact:AssetFound(asset_type=='vehicle')"
    then:
      enqueue:
        - "FetchPriorLiens_Vehicle"
        - "EstimateVehicleValue_AI"

  - rule_id: R_ASSET_FOUND_REAL_ESTATE_TRIGGERS_TAPU_FLOW
    when: "fact:AssetFound(asset_type=='real_estate')"
    then:
      enqueue:
        - "FetchTapuDetails"

  - rule_id: R_LIEN_SNAPSHOT_TRIGGERS_RANK
    when: "fact:LienSnapshot(lien_type!='tedbir')"
    then:
      enqueue:
        - "ComputeOurLienRank_Vehicle"

  - rule_id: R_VALUATION_TRIGGERS_RISK
    when: "fact:ValuationEstimate(confidence!='0')"
    then:
      enqueue:
        - "AnalyzeIK100ParticipationRisk"
