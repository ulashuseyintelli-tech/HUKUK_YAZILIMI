# recipes_v6_extensions.yaml
# v6: Place lien + prior liens activity check + rank computation + IK100 participation risk

recipes:

  - recipe_id: ComputeOurLienRank_Vehicle
    version: 6
    scope: debtor
    stage_tags: [VARLIK, HACIZ]
    trigger: {type: event, when: ["LienSnapshot", "AssetFound"]}
    preconditions:
      - "context.asset_type == 'vehicle'"
      - "context.asset_fingerprint != null"
    uyap_nav_path: ["(internal)"]
    read:
      fields:
        - "facts.LienSnapshot[*].rank_order"
        - "facts.LienSnapshot[*].active_status"
        - "facts.LienSnapshot[*].lien_type"
    actions:
      - type: compute
        formula: |
          # aktif haciz/rehin/takyidat sayısı
          active = [l for l in liens if l.active_status in ['active','unknown']]
          # rank bilgisi yoksa sayıya göre tahmin
          max_rank = max([l.rank_order for l in active if l.rank_order != null], default=null)
          if max_rank is null:
              our_rank = len(active) + 1
              rank_confidence = 0.5
          else:
              our_rank = max_rank + 1
              rank_confidence = 0.8
          set(context.our_rank = our_rank)
          set(context.rank_confidence = rank_confidence)
          set(context.active_prior_liens_count = len(active))
    postconditions:
      - "context.our_rank != null"
      - "emit:ContextUpdated(our_rank)"
    proof: {store: ["timestamp", "context.our_rank", "context.rank_confidence"]}
    audit: {level: controlled_write}

  - recipe_id: CheckPriorLiensActive_Vehicle
    version: 6
    scope: debtor
    stage_tags: [VARLIK, HACIZ]
    trigger: {type: schedule, when: ["EVERY_7_DAYS"]}
    preconditions:
      - "session.is_logged_in == true"
      - "context.asset_type == 'vehicle'"
      - "context.asset_fingerprint != null"
      - "facts.LienSnapshot != empty"
    uyap_nav_path: ["(Araç ekranı)", "Araç Kısıt/Haciz/Takyidat Bilgileri"]
    read:
      table: "vehicle_lien_list"
      fields: ["creditor", "lien_date", "active_status", "reference_no"]
    actions:
      - type: open_asset
        asset_fingerprint: "{{context.asset_fingerprint}}"
      - type: query
        input: {section: "liens_and_restrictions"}
    postconditions:
      - "emit:LienSnapshot delta"
      - "context.prior_liens_activity_checked=true"
    proof: {store: ["timestamp", "snapshot_hash", "context.asset_fingerprint"]}
    audit: {level: read_only}

  - recipe_id: AnalyzeIK100ParticipationRisk
    version: 6
    scope: debtor
    stage_tags: [VARLIK, HACIZ]
    trigger: {type: event, when: ["ContextUpdated(our_rank)", "LienSnapshot", "ValuationEstimate"]}
    preconditions:
      - "context.asset_type == 'vehicle'"
      - "context.our_rank != null"
      - "facts.ValuationEstimate != null"
    uyap_nav_path: ["(internal)"]
    read:
      fields:
        - "context.our_rank"
        - "context.active_prior_liens_count"
        - "facts.LienSnapshot[*].amount_claimed"
        - "facts.LienSnapshot[*].active_status"
        - "facts.ValuationEstimate.value_mid"
        - "facts.ValuationEstimate.confidence"
    actions:
      - type: compute
        formula: |
          unknown_amounts = count([l for l in liens if l.amount_claimed is null and l.active_status in ['active','unknown']])
          unknown_activity = count([l for l in liens if l.active_status == 'unknown'])
          prior_claims_estimate = sum([l.amount_claimed for l in liens if l.amount_claimed is not null and l.active_status in ['active','unknown']], default=null)
          # kaba iştirak riski
          risk = "LOW"
          if context.our_rank >= 4: risk = "HIGH"
          if unknown_amounts > 0 or unknown_activity > 0: risk = "MED"
          if prior_claims_estimate is not null and prior_claims_estimate > facts.ValuationEstimate.value_mid*0.7: risk = "HIGH"
          set(context.participation_risk = risk)
          set(context.prior_claims_estimate = prior_claims_estimate)
          set(context.unknown_amounts_count = unknown_amounts)
          set(context.unknown_activity_count = unknown_activity)
    decisions:
      - if: "context.participation_risk == 'HIGH'"
        then: {open_lock: "LOCK_COST_ACTIONS", enqueue: ["RequireAttorneyDecision"]}
    postconditions:
      - "context.participation_risk in ['LOW','MED','HIGH']"
    proof: {store: ["timestamp", "context.participation_risk", "context.prior_claims_estimate"]}
    audit: {level: controlled_write}

  - recipe_id: PlaceLien_Vehicle
    version: 6
    scope: debtor
    stage_tags: [HACIZ]
    trigger: {type: manual, when: ["USER_APPROVES_PLACE_LIEN"]}
    preconditions:
      - "session.is_logged_in == true"
      - "gates.GATE_PLACE_LIEN == true"
      - "context.asset_type == 'vehicle'"
      - "context.asset_fingerprint != null"
    uyap_nav_path: ["(Araç ekranı)", "Araç Haciz Ekle"]
    read:
      fields: ["uyap.form_fields_ready"]
    actions:
      - type: open_asset
        asset_fingerprint: "{{context.asset_fingerprint}}"
      - type: open_section
        name: "haciz_add"
      - type: fill_form
        fields:
          dosya_no: "{{case.uyap_dosya_no}}"
          alacak_miktari: "{{case.claim_amount}}"
          alacakli: "{{case.creditor_name}}"
      - type: click
        button: "Kaydet"
    postconditions:
      - "case.events += HACIZ_PLACED(asset_fingerprint=context.asset_fingerprint)"
      - "emit:LienSnapshot (our lien)"
    proof: {store: ["timestamp", "context.asset_fingerprint", "uyap.confirmation_ref"]}
    audit: {level: high_impact_write}

  - recipe_id: DecideYakalamaAvansiFlow
    version: 6
    scope: debtor
    stage_tags: [HACIZ]
    trigger: {type: event, when: ["HACIZ_RECOMMENDED", "ContextUpdated(our_rank)"]}
    preconditions:
      - "context.our_rank != null"
      - "context.asset_type == 'vehicle'"
    decisions:
      - if: "context.our_rank == 1 and locks.LOCK_COST_ACTIONS == false"
        then: {enqueue: ["RequestYakalamaAvansi_Communication", "WaitForAdvancePayment"]}
      - if: "context.our_rank > 1"
        then: {enqueue: ["AnalyzeIK100ParticipationRisk"]}
    actions: []
    postconditions: ["case.next_actions updated"]
    proof: {store: ["timestamp", "context.our_rank"]}
    audit: {level: controlled_write}
