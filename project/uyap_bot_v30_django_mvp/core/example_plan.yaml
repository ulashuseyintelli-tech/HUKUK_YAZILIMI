plan:
  cooldown_seconds: 900

  stages:
    DEFAULT:
      recipes:
        - recipe_id: EnsureUYAPSession
          risk_level: read_only
          interval_seconds: 900
          scope: case

    TEBLIGAT:
      recipes:
        - recipe_id: SyncSafahatTimeline
          risk_level: read_only
          interval_seconds: 21600
          scope: case
        - recipe_id: FetchPreparedETebligatlar_Debtor
          risk_level: read_only
          interval_seconds: 21600
          scope: debtor  # her borçlu için ayrı job

    VARLIK:
      recipes:
        - recipe_id: RunAssetQueries_Debtor
          risk_level: read_only
          interval_seconds: 604800
          scope: debtor
        - recipe_id: ScoreAssetProfile_Debtor
          risk_level: controlled_write
          interval_seconds: 86400
          scope: debtor

  adaptive:
    enabled: true
    window_hours: 6
    min_samples: 10
    fail_rate_soft: 0.2
    fail_rate_hard: 0.4
    # hard üstü: interval x2, soft üstü: interval x1.5
