version: "3.8"

# Staging: API + Infra + Prometheus + Grafana
# Usage: docker-compose -f docker/docker-compose.staging.yml up --build -d
# API: http://localhost:8080
# Prometheus: http://localhost:9090
# Grafana: http://localhost:3001 (admin/admin)

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: hukuk-api-staging
    restart: unless-stopped
    environment:
      NODE_ENV: production
      TZ: UTC # legal-time hijyen: prod paritesi; faiz TZ-invariant (PR-3), UTC kilitlenir
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hukuk_db
      JWT_SECRET: staging-jwt-secret-change-me
      REDIS_URL: redis://redis:6379
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: hukuk-postgres-staging
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hukuk_db
    ports:
      - "5432:5432"
    volumes:
      - staging_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hukuk-redis-staging
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - staging_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: hukuk-prometheus-staging
    restart: unless-stopped
    volumes:
      - ./prometheus-staging.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    container_name: hukuk-grafana-staging
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
    depends_on:
      - prometheus

volumes:
  staging_postgres:
  staging_redis:
