version: "3.8"

# I0 Metrics Runway — Local observability harness
# Usage: docker-compose -f docker/docker-compose.yml -f docker/docker-compose.metrics.yml up
#
# Extends base compose with Prometheus + Grafana for local metric validation.
# App must be running on host:3000 (or use docker-compose.prod.yml for containerized app).

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: hukuk-prometheus
    restart: unless-stopped
    volumes:
      - ../ops/prometheus/prometheus-local.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: hukuk-grafana
    restart: unless-stopped
    volumes:
      - ../ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../ops/grafana/guard-dashboard.json:/var/lib/grafana/dashboards/guard-dashboard.json:ro
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
    depends_on:
      - prometheus
