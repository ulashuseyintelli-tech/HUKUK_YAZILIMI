version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: hukuk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hukuk_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hukuk-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Meilisearch for advanced search (optional)
  meilisearch:
    image: getmeili/meilisearch:v1.5
    container_name: hukuk-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: "your-master-key-change-in-production"
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data

  # MinIO for object storage (Phase 9C)
  minio:
    image: minio/minio:latest
    container_name: hukuk-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  minio_data:
